<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map Coordinate Calibration</title>
  <style>
    body {
      background: #0f172a;
      color: #fff;
      font-family: system-ui, sans-serif;
      padding: 40px;
    }
    .modal-mock {
      display: flex;
      width: 920px;
      height: 560px;
      background: #1e293b;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin: 0 auto;
    }
    .left-panel {
      position: relative;
      width: 58%;
      height: 100%;
      background: linear-gradient(140deg, #fdf0f0 0%, #f5e8d8 40%, #efe8e0 100%);
      overflow: hidden;
    }
    .map-image {
      position: absolute;
      width: 165%;
      height: 120%;
      top: -12%;
      left: -28%;
      object-fit: cover;
      filter: sepia(0.15) contrast(1.08) brightness(0.97);
      mix-blend-mode: multiply;
      opacity: 0.85;
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(185,28,28,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }
    .marker {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #ef4444;
      border: 2px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
    }
    .marker-label {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      pointer-events: none;
      font-weight: bold;
    }
    .right-panel {
      flex: 1;
      background: #fff;
      padding: 30px;
      color: #1e293b;
    }
    .controls {
      margin-top: 20px;
      text-align: center;
    }
    input {
      width: 60px;
      padding: 4px;
      background: #334155;
      color: #fff;
      border: 1px solid #475569;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2 style="text-align: center;">Calibrate coordinates by dragging or adjusting input</h2>
  
  <div class="modal-mock">
    <div class="left-panel" id="map-container">
      <img src="/images/japan_3d_map.png" class="map-image" alt="Japan Map">
      <div class="grid-overlay"></div>
      
      <!-- Markers will be rendered here dynamically -->
    </div>
    <div class="right-panel">
      <h3>City Markers Configuration</h3>
      <div id="config-list" style="max-height: 460px; overflow-y: auto; font-size: 12px;"></div>
    </div>
  </div>

  <script>
    // Initial guess coordinates under the new crop (width: 165%, height: 120%, top: -12%, left: -28%)
    const cities = {
      "sapporo":   { x: 74, y: 15 },
      "sendai":    { x: 62, y: 44 },
      "tokyo":     { x: 52, y: 62 },
      "yokohama":  { x: 50, y: 64 },
      "nagoya":    { x: 38, y: 69 },
      "kyoto":     { x: 30, y: 72 },
      "osaka":     { x: 28, y: 74 },
      "kobe":      { x: 25, y: 74 },
      "hiroshima": { x: 15, y: 78 },
      "fukuoka":   { x: 6,  y: 83 }
    };

    const container = document.getElementById('map-container');
    const configList = document.getElementById('config-list');

    function render() {
      // Clear existing markers
      const existing = container.querySelectorAll('.marker');
      existing.forEach(el => el.remove());

      configList.innerHTML = '';

      Object.keys(cities).forEach(name => {
        const coord = cities[name];
        
        // Add marker to map
        const marker = document.createElement('div');
        marker.className = 'marker';
        marker.style.left = `${coord.x}%`;
        marker.style.top = `${coord.y}%`;
        
        const label = document.createElement('div');
        label.className = 'marker-label';
        label.innerText = name.toUpperCase();
        marker.appendChild(label);
        
        container.appendChild(marker);

        // Add config row
        const row = document.createElement('div');
        row.style.margin = '10px 0';
        row.style.display = 'flex';
        row.style.alignItems = 'center';
        row.style.justifyContent = 'space-between';
        row.innerHTML = `
          <strong style="width: 80px;">${name}:</strong>
          X: <input type="number" data-city="${name}" data-prop="x" value="${coord.x}">%
          Y: <input type="number" data-city="${name}" data-prop="y" value="${coord.y}">%
        `;
        configList.appendChild(row);
      });

      // Bind inputs
      configList.querySelectorAll('input').forEach(input => {
        input.addEventListener('change', (e) => {
          const city = e.target.dataset.city;
          const prop = e.target.dataset.prop;
          cities[city][prop] = parseInt(e.target.value);
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
